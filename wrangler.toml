name = "clawdbot-install"
main = "cloudflare/install-worker.js"
compatibility_date = "2025-01-01"
workers_dev = true

[vars]
UPSTREAM_INSTALL_URL = "https://raw.githubusercontent.com/Solizardking/clawdbot-go/main/install.sh"
DEFAULT_COMPLETE = "1"
PROJECT_REPO = "https://github.com/Solizardking/clawdbot-go"
ECOSYSTEM_HUB = "https://github.com/solizardking/solana-clawd"

[[routes]]
pattern = "install.onchainai.fund"
custom_domain = true

[[routes]]
pattern = "install.x402.wtf"
custom_domain = true

[[routes]]
pattern = "x402.wtf/clawdbot*"
zone_name = "x402.wtf"

[[routes]]
pattern = "zk.x402.wtf/clawdbot*"
zone_name = "x402.wtf"
